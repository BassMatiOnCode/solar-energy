<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="452" height="502" viewBox="-190 -210 450 500" xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg" style="border: 1px none silver" stroke-linecap="round">
<style>
	.connection { stroke-width : 2px ; stroke : blue ; fill : none ; }
	.repetetion { stroke-width : 3px ; stroke : black ; fill : none ; stroke-dasharray : 1 8 ; }
