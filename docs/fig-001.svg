	g.textbox rect { fill : white ; stroke : none }
	rect { stroke : black ; stroke-width : 2px ; fill : none }
	text { text-anchor : middle ; dominant-baseline : central ; font-size : 18px ; }
</style>

<g transform="translate(-100, -160)">
